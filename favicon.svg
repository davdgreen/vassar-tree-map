<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="#2E7D32"/>
  <!-- Trunk -->
  <rect x="43" y="66" width="14" height="26" rx="5" fill="#E8F5E9"/>
  <!-- Canopy shadow (gives depth) -->
  <circle cx="50" cy="44" r="30" fill="#1B5E20"/>
  <!-- Main canopy -->
  <circle cx="50" cy="41" r="28" fill="#E8F5E9"/>
  <!-- Inner shadow to give a leafy feel -->
  <circle cx="50" cy="41" r="28" fill="#2E7D32" opacity="0.15"/>
  <!-- Left sub-cluster -->
  <circle cx="34" cy="46" r="14" fill="#E8F5E9"/>
  <!-- Right sub-cluster -->
  <circle cx="66" cy="46" r="13" fill="#E8F5E9"/>
  <!-- Crown -->
  <circle cx="50" cy="22" r="15" fill="#E8F5E9"/>
</svg>
