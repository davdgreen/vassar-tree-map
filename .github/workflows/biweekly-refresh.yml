name: Biweekly ArborScope data refresh

on:
  schedule:
    - cron: '0 12 1,15 * *'  # 1st and 15th of each month at noon UTC
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Scrape ArborScope
        run: python3 scrape_arborscope.py

      - name: Rebuild map
        run: python3 build_vassar_map.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vassar_arboretum.csv vassar_enriched.json index.html vassar-tree-map.html
          if git diff --cached --quiet; then
            echo "No changes — data is already up to date."
          else
            git commit -m "Biweekly data refresh from ArborScope ($(date +%Y-%m-%d))"
            git push
          fi
